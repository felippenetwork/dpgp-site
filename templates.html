<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Templates — DPGP</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💬</text></svg>">
</head>
<body>
<div class="app-layout">
  <div id="sidebar-placeholder"></div>

  <div class="main">
    <header class="topbar">
      <div class="page-heading">
        <span class="page-title">Templates</span>
        <span class="page-sub">Postagens para disparo</span>
      </div>
      <div class="topbar-actions">
        <span id="tpl-count" class="text-muted text-sm"></span>
        <button class="btn btn-primary" onclick="openModal()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Novo Template
        </button>
      </div>
    </header>

    <div class="content">
      <!-- Toolbar -->
      <div class="toolbar">
        <div class="search-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" class="search-input" id="search" placeholder="Buscar templates..." oninput="renderGrid()">
        </div>
        <select class="filter-select" id="filter-type" onchange="renderGrid()">
          <option value="">Todos os tipos</option>
          <option value="text">Texto</option>
          <option value="image">Imagem</option>
          <option value="video">Vídeo</option>
          <option value="audio">Áudio</option>
        </select>
        <select class="filter-select" id="filter-status" onchange="renderGrid()">
          <option value="">Todos</option>
          <option value="active">Ativos</option>
          <option value="inactive">Inativos</option>
        </select>
      </div>

      <div id="templates-grid" class="templates-grid"></div>
    </div>
  </div>
</div>

<!-- Create / Edit Modal -->
<div class="modal-backdrop hidden" id="modal-backdrop" onclick="closeModalBackdrop(event)">
  <div class="modal modal-lg">
    <div class="modal-header">
      <span class="modal-title" id="modal-title">Novo Template</span>
      <button class="modal-close" onclick="closeModal()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="edit-id">

      <div class="form-group">
        <label class="form-label">Nome do Template</label>
        <input type="text" id="tpl-name" class="form-control" placeholder="Ex: Promoção de Verão, Aviso de Reunião...">
      </div>

      <div class="form-group">
        <label class="form-label">Tipo de conteúdo</label>
        <select id="tpl-type" class="form-control" onchange="onTypeChange()">
          <option value="text">💬 Texto</option>
          <option value="image">🖼️ Imagem</option>
          <option value="video">🎬 Vídeo</option>
          <option value="audio">🎵 Áudio</option>
        </select>
      </div>

      <!-- Media field (image/video/audio) -->
      <div id="media-section" class="hidden">
        <div class="form-group">
          <label class="form-label">Mídia</label>
          <div style="display:flex;gap:8px;margin-bottom:10px">
            <button type="button" class="btn btn-secondary btn-sm" id="tab-upload" onclick="setMediaTab('upload')" style="flex:1">📁 Enviar arquivo</button>
            <button type="button" class="btn btn-ghost btn-sm" id="tab-url" onclick="setMediaTab('url')" style="flex:1">🔗 Usar URL</button>
          </div>

          <div id="media-tab-upload">
            <div id="upload-drop-area" style="border:2px dashed var(--border);border-radius:var(--radius-sm);padding:24px;text-align:center;cursor:pointer;transition:border-color .2s" onclick="document.getElementById('tpl-file-input').click()" ondragover="event.preventDefault();this.style.borderColor='var(--accent)'" ondragleave="this.style.borderColor='var(--border)'" ondrop="handleFileDrop(event)">
              <input type="file" id="tpl-file-input" accept="image/*,video/*,audio/*" style="display:none" onchange="handleFileSelect(this.files[0])">
              <div id="upload-idle">
                <div style="font-size:28px;margin-bottom:8px">📂</div>
                <div style="font-size:13px;color:var(--text-2)">Clique ou arraste o arquivo aqui</div>
                <div style="font-size:11px;color:var(--text-3);margin-top:4px">Imagem, vídeo ou áudio · máx. 50MB</div>
              </div>
              <div id="upload-progress" class="hidden" style="font-size:13px;color:var(--text-2)">⏳ Enviando...</div>
              <div id="upload-done" class="hidden" style="font-size:13px;color:var(--accent)"></div>
            </div>
          </div>

          <div id="media-tab-url" class="hidden">
            <input type="url" id="tpl-media-url" class="form-control" placeholder="https://exemplo.com/imagem.jpg" oninput="previewMedia()">
            <div class="form-hint">Use links de CDN, Google Drive (modo público), Cloudinary, etc.</div>
          </div>
        </div>
        <div id="media-preview-wrap" class="upload-preview hidden"></div>
      </div>

      <div class="form-group">
        <label class="form-label" id="content-label">Conteúdo / Legenda</label>
        <textarea id="tpl-content" class="form-control" placeholder="Digite o texto da postagem aqui..." rows="5"
          oninput="updateCharCount()"></textarea>
        <div class="form-hint">
          Use <code style="background:var(--bg-hover);padding:1px 5px;border-radius:3px;font-size:11px">{menção}</code> para mencionar todos os membros do grupo.
          <span id="char-count" style="float:right;font-size:12px;color:var(--text-3)">0 caracteres</span>
        </div>
      </div>

      <div class="form-group">
        <label class="toggle-wrap">
          <div class="toggle">
            <input type="checkbox" id="tpl-active" checked>
            <div class="toggle-track"></div>
            <div class="toggle-thumb"></div>
          </div>
          <span style="font-size:13.5px;color:var(--text-2)">Template ativo (incluir nos disparos)</span>
        </label>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" id="modal-save-btn" onclick="saveTemplate()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
        Salvar Template
      </button>
    </div>
  </div>
</div>

<!-- View Modal (full preview) -->
<div class="modal-backdrop hidden" id="view-backdrop" onclick="closeViewBackdrop(event)">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="view-title">Visualizar Template</span>
      <button class="modal-close" onclick="closeView()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body" id="view-body"></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeView()">Fechar</button>
      <button class="btn btn-primary" id="view-edit-btn">Editar</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/store.js"></script>
<script src="js/app.js"></script>
<script src="js/templates.js"></script>
</body>
</html>
