<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — DPGP</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💬</text></svg>">
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-brand">
        <div class="login-logo">💬</div>
        <div class="login-title" id="app-title">DPGP</div>
        <div class="login-sub" id="app-tagline">Disparo de Grupos WhatsApp</div>
      </div>

      <div class="login-error" id="login-error">Usuário ou senha incorretos.</div>

      <form id="login-form">
        <div class="form-group">
          <label class="form-label">Usuário</label>
          <input
            type="text"
            id="input-user"
            class="form-control"
            placeholder="Digite seu usuário"
            autocomplete="username"
            required
          >
        </div>
        <div class="form-group">
          <label class="form-label">Senha</label>
          <input
            type="password"
            id="input-pass"
            class="form-control"
            placeholder="••••••••"
            autocomplete="current-password"
            required
          >
        </div>
        <button type="submit" class="btn btn-primary w-full" style="justify-content:center;padding:11px;">
          Entrar
        </button>
      </form>

      <p style="text-align:center;margin-top:20px;font-size:12px;color:var(--text-3);">
        DPGP v<span id="app-version">1.0.0</span>
      </p>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script>
    // Redirect if already logged
    if (localStorage.getItem('dpgp_session') === 'ok') {
      window.location.href = 'dashboard.html';
    }

    document.getElementById('app-title').textContent    = CONFIG.appName;
    document.getElementById('app-tagline').textContent  = CONFIG.appTagline;
    document.getElementById('app-version').textContent  = CONFIG.version;

    document.getElementById('login-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const user = document.getElementById('input-user').value.trim();
      const pass = document.getElementById('input-pass').value;
      const errEl = document.getElementById('login-error');

      if (user === CONFIG.adminUser && pass === CONFIG.adminPassword) {
        localStorage.setItem('dpgp_session', 'ok');
        window.location.href = 'dashboard.html';
      } else {
        errEl.style.display = 'block';
        document.getElementById('input-pass').value = '';
        document.getElementById('input-pass').focus();
      }
    });
  </script>
</body>
</html>
